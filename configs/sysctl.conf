# --- Wilmore Dynamics // Hardened Debian 13 ---
# Emplacement : /etc/sysctl.d/99-hardened.conf
# Objectif : Protection contre les attaques réseau communes (L3/L4)

# 1. Protection contre le SYN Flood (Déni de service)
net.ipv4.tcp_syncookies = 1
net.ipv4.tcp_max_syn_backlog = 2048
net.ipv4.tcp_synack_retries = 2

# 2. Désactivation des redirections ICMP (Empêche le détournement de trafic)
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# 3. Protection contre le Spoofing IP (Reverse Path Filtering)
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# 4. Ignorer les messages de broadcast ICMP (Évite d'être utilisé pour du Smurf Attack)
net.ipv4.icmp_echo_ignore_broadcasts = 1

# 5. Désactivation de l'IP Forwarding (Le serveur ne doit pas router de paquets)
net.ipv4.ip_forward = 0